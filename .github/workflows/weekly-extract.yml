name: Extracción semanal de precios

on:
  # Cada martes a las 13:00 UTC (15:00 hora Madrid, después de que la Lonja publique)
  schedule:
    - cron: '0 13 * * 2'
  # Permite lanzarlo manualmente desde la pestaña Actions de GitHub
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python y dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Ejecutar extracción
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python extract_historico.py
